<!DOCTYPE html>

<html class="h-full" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connexion - Style GlobalStage</title>
<!-- Tailwind CSS CDN with Forms and Container-Queries -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="custom-layout">
    /* Ensuring the split screen takes full viewport height and prevents scrolling */
    .auth-container {
      height: 100vh;
      overflow: hidden;
    }
    
    /* Custom brand colors to match requested #1E40AF */
    .bg-brand-blue {
      background-color: #1E40AF;
    }
    .text-brand-blue {
      color: #1E40AF;
    }
    .border-brand-blue {
      border-color: #1E40AF;
    }
    .hover-bg-brand-blue:hover {
      background-color: #1a3a9b;
    }
    
    /* Overlay for the image to maintain brand dominance */
    .image-overlay {
      background: linear-gradient(rgba(30, 64, 175, 0.8), rgba(30, 64, 175, 0.8));
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden h-full">
<!-- BEGIN: MainAuthContainer -->
<main class="auth-container flex flex-col md:flex-row w-full h-screen" data-purpose="login-split-screen">
<!-- BEGIN: LeftColumn -->
<section class="hidden md:flex md:w-1/2 relative bg-brand-blue overflow-hidden" data-purpose="brand-imagery-column">
<!-- Background Image -->
<img alt="Young African Professional" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxS1O1_0-ZJzmosZLKXPXNFnU8rsSInsl6ZiimcwDIlbObJRWxkP-XuPx3kVzfFwzuO7WlDJ38MWhLM9EZVf6j73uATfdJ8E0LmSTygU4Uo-usj8_7tgQyiTvFd6vvNKCRGTtNhKZVUceN5kRAsHNLwPEx13O9G5dhEWdhedCncDz0-1KdkJBEOEPM0tjvs9MysMsz0ylYEhJZHTHHz-w4GGiPrRN65r7qzYdr4g5HGP9ZG1eIVM-okSvdvX6JDo_P7RuufxJI9_ho"/>
<!-- Brand Overlay -->
<div class="absolute inset-0 image-overlay flex flex-col justify-center px-12 lg:px-24 text-white z-10">
<h1 class="text-4xl lg:text-5xl font-bold mb-6">StageLink Burkina</h1>
<p class="text-lg lg:text-xl font-light opacity-90 max-w-md">
          Propulsez votre carrière et trouvez des opportunités exceptionnelles à travers tout le Burkina Faso.
        </p>
</div>
<!-- Subtle background graphic elements -->
<div class="absolute bottom-0 right-0 p-8 opacity-20">
<svg fill="none" height="200" viewbox="0 0 200 200" width="200" xmlns="http://www.w3.org/2000/svg">
<circle cx="100" cy="100" fill="white" r="100"></circle>
</svg>
</div>
</section>
<!-- END: LeftColumn -->
<!-- BEGIN: RightColumn -->
<section class="w-full md:w-1/2 flex items-center justify-center bg-white p-6 md:p-12 lg:p-24 overflow-y-auto" data-purpose="login-form-column">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="mb-8">
<h2 class="text-3xl font-bold text-brand-blue mb-2">Connexion</h2>
<p class="text-gray-500">Ravi de vous revoir ! Veuillez vous connecter à votre compte.</p>
</div>
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" data-purpose="auth-form" method="POST">
<!-- Email Field -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="email">Adresse e-mail</label>
<input class="block w-full px-4 py-3 rounded-lg border-gray-300 shadow-sm focus:ring-brand-blue focus:border-brand-blue transition duration-150" id="email" name="email" placeholder="moussa@exemple.bf" required="" type="email"/>
</div>
<!-- Password Field -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="password">Mot de passe</label>
<div class="relative">
<input class="block w-full px-4 py-3 rounded-lg border-gray-300 shadow-sm focus:ring-brand-blue focus:border-brand-blue transition duration-150" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<!-- Eye Icon (Toggle visibility - visual only for this template) -->
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600" id="togglePassword" type="button">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-brand-blue focus:ring-brand-blue border-gray-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700" for="remember-me">Se souvenir de moi</label>
</div>
<div class="text-sm">
<a class="font-medium text-brand-blue hover:underline" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-brand-blue text-white font-bold rounded-lg shadow-md hover-bg-brand-blue focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-blue transition duration-200 transform active:scale-[0.98]" type="submit">
            Se connecter
          </button>
</form>
<!-- END: LoginForm -->
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="text-sm text-gray-600">
            Pas encore de compte ? 
            <a class="font-semibold text-brand-blue hover:underline ml-1" href="#">S'inscrire</a>
</p>
</div>
</div>
</section>
<!-- END: RightColumn -->
</main>
<!-- END: MainAuthContainer -->
<script data-purpose="ui-interactivity">
    // Simple script to demonstrate password visibility toggle capability
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Optional: change icon appearance based on state
      this.classList.toggle('text-brand-blue');
    });
  </script>
</body></html>
